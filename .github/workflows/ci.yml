name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pampa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Prisma generate + migrate
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pampa
          JWT_SECRET: test-test-test-test-test-test
          NODE_ENV: test
          FRONTEND_URL: http://localhost:5173
        run: |
          npm run prisma:generate
          npm run prisma:migrate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pampa
          JWT_SECRET: test-test-test-test-test-test
          NODE_ENV: test
          FRONTEND_URL: http://localhost:5173
          PORT: 8787
        run: nohup npm run dev >/tmp/server.log 2>&1 &

      - name: Start frontend
        env:
          VITE_API_BASE: http://localhost:8787
        run: nohup npm run dev -- --host 0.0.0.0 --port 5173 >/tmp/frontend.log 2>&1 &

      - name: Wait for services
        run: |
          node - <<'NODE'
          const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
          async function waitFor(url, label, attempts = 40, delayMs = 1500) {
            let lastErr = null;
            for (let i = 0; i < attempts; i++) {
              try {
                const res = await fetch(url);
                if (res.ok) {
                  console.log(`[wait] ${label} ok (${res.status})`);
                  return;
                }
                lastErr = new Error(`${label} status ${res.status}`);
              } catch (e) {
                lastErr = e;
              }
              console.log(`[wait] ${label} not ready yet (${i + 1}/${attempts})`);
              await sleep(delayMs);
            }
            console.error(`[wait] ${label} failed:`, lastErr?.message ?? lastErr);
            process.exit(1);
          }
          await waitFor('http://localhost:8787/health', 'backend');
          await waitFor('http://localhost:5173', 'frontend');
          NODE

      - name: E2E tests
        env:
          VITE_API_BASE: http://localhost:8787
        run: npm run test:e2e

