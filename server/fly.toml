app = "pampa-crm"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

# Aplica migraciones Prisma en cada deploy (p. ej. nuevos valores de enum como AiProvider).
[deploy]
  # Be verbose in deploy logs so we can debug failures.
  # Also fail fast with a clear message if DATABASE_URL is missing.
  # NOTE: Fly sometimes fails to fetch release_command logs if the machine exits too quickly.
  # Keep the machine alive briefly on exit so logs can be collected.
  release_command = "sh -lc 'set -eux; trap \"ec=$?; echo RELEASE_COMMAND_EXIT=$ec; sleep 20; exit $ec\" EXIT; node -v; npx prisma -v; test -n \"${DATABASE_URL:-}\" || (echo \"DATABASE_URL is missing\" && exit 1); npx prisma migrate deploy'"
  release_command_timeout = "10m"

[processes]
  app = "node dist/index.js"

[http_service]
  internal_port = 8787
  processes = ["app"]
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

