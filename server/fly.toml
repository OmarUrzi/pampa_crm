app = "pampa-crm"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[processes]
  # Run migrations on boot so logs show in the main app output.
  app = "sh -lc 'set -eux; node -v; npx prisma -v; test -n \"${DATABASE_URL:-}\" || (echo \"DATABASE_URL is missing\" && exit 1); npx prisma migrate deploy; exec node dist/index.js'"

[http_service]
  internal_port = 8787
  processes = ["app"]
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

