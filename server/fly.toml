app = "pampa-crm"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

# Aplica migraciones Prisma en cada deploy (p. ej. nuevos valores de enum como AiProvider).
[deploy]
  release_command = "npx prisma migrate deploy"

[processes]
  app = "node dist/index.js"

[http_service]
  internal_port = 8787
  processes = ["app"]
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

