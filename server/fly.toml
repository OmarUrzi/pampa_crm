app = "pampa-crm-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8787
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

